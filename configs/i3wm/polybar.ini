; ==============================================================================
; Polybar 配置 — Catppuccin Mocha 主题
; ==============================================================================

[colors]
; Catppuccin Mocha
background    = #1e1e2e
background-alt = #313244
foreground    = #cdd6f4
foreground-alt = #a6adc8
primary       = #89b4fa
secondary     = #cba6f7
alert         = #f38ba8
success       = #a6e3a1
warning       = #f9e2af
disabled      = #585b70

[bar/main]
width = 100%
height = 28
radius = 0
fixed-center = true
foreground = ${colors.foreground}
background = ${colors.background}

; 模块位置
modules-left = i3
modules-center = date
modules-right = cpu memory filesystem pulseaudio network battery

; 字体
font-0 = JetBrains Mono:size=10:antialias=true;2
font-1 = JetBrainsMono Nerd Font:size=10:antialias=true;2
font-2 = Noto Sans CJK SC:size=10:antialias=true;2

; 间距
margin-top = 0
margin-bottom = 0
padding-left = 10
padding-right = 10
module-margin = 2

; 鼠标
cursor-click = pointer
cursor-scroll = pointer

; 托盘
tray-position = right
tray-padding = 4
tray-background = ${colors.background}

[module/i3]
type = internal/i3
format = <label-state> <label-mode>
label-focused = %index%
label-focused-foreground = ${colors.background}
label-focused-background = ${colors.primary}
label-focused-padding = 2
label-unfocused = %index%
label-unfocused-foreground = ${colors.foreground-alt}
label-unfocused-padding = 2
label-visible = %index%
label-visible-foreground = ${colors.foreground}
label-visible-padding = 2
label-urgent = %index%
label-urgent-foreground = ${colors.background}
label-urgent-background = ${colors.alert}
label-urgent-padding = 2
label-separator = 
label-mode-padding = 2

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = ""
format-prefix-foreground = ${colors.primary}
format = <label>
label = %percentage:2%%

[module/memory]
type = internal/memory
interval = 2
format-prefix = ""
format-prefix-foreground = ${colors.secondary}
format = <label>
label = %gb_used%

[module/filesystem]
type = internal/filesystem
interval = 30
mount-point = /
format-prefix = ""
format-prefix-foreground = ${colors.foreground-alt}
format = <label>
label = %free%

[module/pulseaudio]
type = internal/pulseaudio
format-volume = <ramp-volume>
label-muted = ""
label-muted-foreground = ${colors.alert}

[module/network]
type = internal/network
interface = wlp2s0
interval = 3
format-connected = <label-connected>
label-connected = %essid% %local_ip%
label-disconnected = ""

[module/battery]
type = internal/battery
full-at = 98
time-format = %H:%M
format-charging = <animation-charging> <label-charging>
format-discharging = <ramp-capacity> <label-discharging>
format-full = <label-full>
label-full = ""

[module/date]
type = internal/date
interval = 1
date = %Y-%m-%d
time = %H:%M:%S
format = <label>
label = %date% %time%
label-foreground = ${colors.warning}
