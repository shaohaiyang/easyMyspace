# ==============================================================================
# Kitty 增强配置 — Catppuccin Mocha 主题
# 保留你全部的 Ctrl+Z 键位体系，统一视觉风格
# ==============================================================================

# --- 字体 ---
font_family      JetBrains Mono Regular
bold_font        JetBrains Mono Bold
italic_font      JetBrains Mono Italic
bold_italic_font JetBrains Mono Bold Italic
font_size 14
font_features JetBrainsMono-Regular +liga +calt

# --- 窗口与背景 ---
background_opacity 0.93
background_blur 12
remember_window_size  yes
window_padding_width 6
hide_window_decorations  no

# --- 滚动与远程控制 ---
scrollback_lines 10000
allow_remote_control yes
allow_hyperlinks yes
enabled_layouts splits,stack

# ==============================================================================
# Catppuccin Mocha 主题色
# ==============================================================================
foreground #cdd6f4
background #1e1e2e
selection_foreground #1e1e2e
selection_background #f5e0dc

# 黑 (0)
color0 #45475a
color8 #585b70

# 红 (1)
color1 #f38ba8
color9 #f38ba8

# 绿 (2)
color2 #a6e3a1
color10 #a6e3a1

# 黄 (3)
color3 #f9e2af
color11 #f9e2af

# 蓝 (4)
color4 #89b4fa
color12 #89b4fa

# 紫 (5)
color5 #cba6f7
color13 #cba6f7

# 青 (6)
color6 #94e2d5
color14 #94e2d5

# 白 (7)
color7 #bac2de
color15 #a6adc8

# --- 光标 ---
cursor #f5e0dc
cursor_text_color #1e1e2e

# --- 链接色 ---
url_color #89b4fa
url_style curly

# --- 标记高亮 ---
mark1_foreground #1e1e2e
mark1_background #f38ba8
mark2_foreground #1e1e2e
mark2_background #a6e3a1
mark3_foreground #1e1e2e
mark3_background #f9e2af

# ==============================================================================
# 状态栏与标签页 (底部, Slant 风格)
# ==============================================================================
tab_bar_edge bottom
tab_bar_style slant

tab_title_template " {index}: {title} "
active_tab_title_template "  {index}:{title}  "

# Catppuccin 风格标签颜色
active_tab_foreground   #1e1e2e
active_tab_background   #89b4fa
inactive_tab_foreground #a6adc8
inactive_tab_background #313244
tab_bar_background      #11111b

active_tab_font_style   bold
inactive_tab_font_style normal

# ==============================================================================
# 分屏边框
# ==============================================================================
active_border_color #89b4fa
inactive_border_color #45475a
bell_border_color #f9e2af

# ==============================================================================
# 键位映射 — 完全保留你的 Ctrl+Z 体系
# ==============================================================================

# --- 分屏与标签页 ---
map ctrl+z>u launch --location=vsplit --cwd=current
map ctrl+z>v launch --location=hsplit --cwd=current
map ctrl+z>o launch --type=tab --cwd=current
map ctrl+z>ctrl+z next_window
map ctrl+z>r load_config_file

# --- Tab 切换 ---
map ctrl+z>b previous_tab
map ctrl+z>a next_tab

# --- 向 tmux 透传 Ctrl+Z ---
map ctrl+z>c combine : send_key ctrl+z : send_key c

# --- Vim 风格分屏焦点 ---
map ctrl+z>h neighboring_window left
map ctrl+z>l neighboring_window right
map ctrl+z>j neighboring_window down
map ctrl+z>k neighboring_window up

# --- 调整分屏大小 ---
map ctrl+z>ctrl+h resize_window narrower 10
map ctrl+z>ctrl+l resize_window wider 10
map ctrl+z>ctrl+j resize_window shorter 10
map ctrl+z>ctrl+k resize_window taller 10

# --- 快捷应用 ---
map ctrl+z>] launch --location=split htop
map ctrl+z>/ launch --location=split --cwd=current zsh -i -c "opencode"
map ctrl+z>backslash launch --location=split --cwd=current zsh -i -c "lazygit"
map ctrl+z>e launch --location=split --cwd=current zsh -i -c "yazi"

# --- 全屏放大 ---
map ctrl+z>z toggle_layout stack

# --- 额外增强绑定 ---
# Ctrl+Shift+C/V 复制粘贴（Kitty 默认）
# Ctrl+Shift+Enter 新建窗口（kitty 默认）
map ctrl+shift+enter launch --type=tab --cwd=current
map ctrl+shift+right next_tab
map ctrl+shift+left previous_tab
