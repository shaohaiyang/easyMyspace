# ==============================================================================
# Tmux 增强配置 — Catppuccin Mocha 主题
# Ctrl+Z 前缀 + u/v 分屏 + h/j/k/l 导航
# ==============================================================================

# --- 前缀键 Ctrl+Z ---
unbind C-b
set -g prefix C-z
bind C-z send-prefix

# --- 分屏（保留你的 u/v） ---
bind u split-window -h
bind v split-window -v
unbind '"'
unbind %

# --- 窗口管理 ---
bind c new-window -n 'shell'
bind n next-window
bind p previous-window
bind , command-prompt "rename-window '%%'"

# --- Vim 导航（保留你的 h/j/k/l） ---
bind h select-pane -L
bind l select-pane -R
bind j select-pane -D
bind k select-pane -U

# --- 分屏循环 ---
bind ^z select-pane -t :.+

# --- 同步输入 ---
bind e setw synchronize-panes

# --- 调整分屏大小（保留你的 Ctrl+h/j/k/l） ---
bind -r ^k resizep -U 10
bind -r ^j resizep -D 10
bind -r ^h resizep -L 10
bind -r ^l resizep -R 10

# --- 缩放分屏（prefix + z） ---
bind z resize-pane -Z

# --- 快捷应用 ---
bind ] splitw -h htop
bind o splitw -h -c "#{pane_current_path}" opencode
bind g splitw -h -c "#{pane_current_path}" lazygit
bind e splitw -h -c "#{pane_current_path}" yazi

# --- 重载配置 ---
bind r source ~/.tmux.conf \; display "Configuration reloaded!"

# --- 系统剪贴板（macOS + Linux） ---
if-shell 'test "$(uname)" = Darwin' {
  bind C-c run "tmux save-buffer - | pbcopy"
  bind C-v run "pbpaste | tmux load-buffer - \; paste-buffer -d"
}
if-shell 'test "$(uname)" = Linux' {
  bind C-c run "tmux save-buffer - | wl-copy"
  bind C-v run "wl-paste | tmux load-buffer - \; paste-buffer -d"
}

# panel
set -g display-panes-active-colour blue
set -g display-panes-colour brightred

# statusbar
set -g status-left "#[bg=#FF661D] ❐ #S " # 状态栏左侧内容
set -g status-right '#[fg=white,bg=default]%H:%M #[default] #[fg=green]%Y-%m-%d %a'
set -g status-interval 1 # 状态栏刷新时间
set -g status-bg black # 设置状态栏背景黑色
set -g status-fg yellow # 设置状态栏前景黄色
set -g status-style "bg=black, fg=yellow" # 状态栏前景背景色
set -g status-left-length 300 # 状态栏左边长度300
set -g status-right-length 500 # 状态栏左边长度500
set -g allow-rename off
set -g visual-activity on
set -g message-style "bg=#202529, fg=#91A8BA" # 指定消息通知的前景、后景色
set -g status-keys vi
set -g default-terminal "screen-256color" # Set the default terminal mode to 256color mode
set -g history-limit 10000

# window
setw -g mode-keys vi
setw -g automatic-rename off
setw -g status-justify centre
setw -g monitor-activity on # 非当前窗口有内容更新时在状态栏通知
setw -g visual-bell off
setw -g window-status-format " #I #W " # 状态栏窗口名称格式
setw -g window-status-current-format " #I:#W#F " # 状态栏当前窗口名称格式(#I：序号，#w：窗口名称，#F：间隔符)
setw -g window-status-separator "" # 状态栏窗口名称之间的间隔
setw -g window-status-current-style "bg=red" # 状态栏当前窗口名称的样式
setw -g window-status-last-style "fg=red" # 状态栏最后一个窗口名称的样式

#恢复shell的历史记录
setw -g @resurrect-save-shell-history 'on'
setw -g base-index 1 # 设置窗口的起始下标为1
setw -g pane-base-index 1 # 设置面板的起始下标为1

#-- colorscheme --#
setw -g clock-mode-colour colour223
setw -g clock-mode-style 24

# --- 鼠标支持 ---
set -g mouse on

# --- 聚焦跟随鼠标 ---
set -g focus-events on
set -g renumber-windows on
