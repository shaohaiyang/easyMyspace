# ==============================================================================
# Tmux 增强配置 — Catppuccin Mocha 主题
# Ctrl+Z 前缀 + u/v 分屏 + h/j/k/l 导航
# ==============================================================================

# --- 前缀键 Ctrl+Z ---
unbind C-b
set -g prefix C-z
bind C-z send-prefix

# --- 分屏（保留你的 u/v） ---
bind u split-window -h
bind v split-window -v
unbind '"'
unbind %

# --- 窗口管理 ---
bind c new-window -n 'shell'
bind n next-window
bind p previous-window
bind , command-prompt "rename-window '%%'"

# --- Vim 导航（保留你的 h/j/k/l） ---
bind h select-pane -L
bind l select-pane -R
bind j select-pane -D
bind k select-pane -U

# --- 分屏循环 ---
bind ^z select-pane -t :.+

# --- 同步输入 ---
bind e setw synchronize-panes

# --- 调整分屏大小（保留你的 Ctrl+h/j/k/l） ---
bind -r ^k resizep -U 10
bind -r ^j resizep -D 10
bind -r ^h resizep -L 10
bind -r ^l resizep -R 10

# --- 缩放分屏（prefix + z） ---
bind z resize-pane -Z

# --- 快捷应用 ---
bind ] splitw htop
bind / command-prompt "splitw 'exec python3 %%'"
bind \\ splitw -c "#{pane_current_path}" lazygit
bind e splitw -c "#{pane_current_path}" yazi

# --- 重载配置 ---
bind r source ~/.tmux.conf \; display "Configuration reloaded!"

# --- 系统剪贴板（macOS + Linux） ---
if-shell 'test "$(uname)" = Darwin' {
  bind C-c run "tmux save-buffer - | pbcopy"
  bind C-v run "pbpaste | tmux load-buffer - \; paste-buffer -d"
}
if-shell 'test "$(uname)" = Linux' {
  bind C-c run "tmux save-buffer - | wl-copy"
  bind C-v run "wl-paste | tmux load-buffer - \; paste-buffer -d"
}

# ==============================================================================
# Catppuccin Mocha 主题状态栏
# ==============================================================================

# --- 颜色变量 ---
THM_BG="#1e1e2e"
THM_FG="#cdd6f4"
THM_CYAN="#94e2d5"
THM_BLUE="#89b4fa"
THM_PINK="#f5c2e7"
THM_GREEN="#a6e3a1"
THM_YELLOW="#f9e2af"
THM_RED="#f38ba8"
THM_LAVENDER="#b4befe"
THM_SURFACE="#313244"
THM_MANTLE="#181825"
THM_CRUST="#11111b"

# --- 状态栏整体 ---
set -g status-interval 1
set -g status-bg "colour0"
set -g status-style "bg=$THM_BG, fg=$THM_FG"
set -g status-left-length 100
set -g status-right-length 100
set -g status-justify centre

# --- 左侧 ---
set -g status-left "#[bg=$THM_BLUE,fg=$THM_CRUST]  #S  #[bg=$THM_BG,fg=$THM_BLUE]"

# --- 窗口列表 ---
setw -g window-status-format " #[bg=$THM_SURFACE,fg=$THM_FG] #I #W #[bg=$THM_BG,fg=$THM_SURFACE]"
setw -g window-status-current-format "#[bg=$THM_BLUE,fg=$THM_CRUST] #I #W #[bg=$THM_BG,fg=$THM_BLUE]"
setw -g window-status-separator ""
setw -g window-status-current-style "bg=$THM_BLUE, fg=$THM_CRUST"
setw -g window-status-last-style "fg=$THM_BLUE"
setw -g window-status-activity-style "fg=$THM_GREEN"

# --- 右侧（时间 + 日期） ---
set -g status-right "#[bg=$THM_BG,fg=$THM_SURFACE] #[bg=$THM_SURFACE,fg=$THM_FG] %H:%M #[bg=$THM_CRUST,fg=$THM_SURFACE] #[bg=$THM_CRUST,fg=$THM_GREEN] %Y-%m-%d "

# --- 消息样式 ---
set -g message-style "bg=$THM_SURFACE, fg=$THM_FG"
set -g message-command-style "bg=$THM_SURFACE, fg=$THM_CYAN"

# --- 面板显示 ---
set -g display-panes-active-colour "$THM_BLUE"
set -g display-panes-colour "$THM_RED"
set -g display-panes-time 3000

# --- 时钟 ---
setw -g clock-mode-colour "$THM_LAVENDER"
setw -g clock-mode-style 24

# ==============================================================================
# 通用设置
# ==============================================================================
set -g default-terminal "screen-256color"
set -g history-limit 10000
set -g allow-rename off
set -g visual-activity on
set -g status-keys vi
setw -g mode-keys vi
setw -g automatic-rename off
setw -g monitor-activity on
setw -g visual-bell off
setw -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# --- 鼠标支持 ---
set -g mouse on

# --- 聚焦跟随鼠标 ---
set -g focus-events on
