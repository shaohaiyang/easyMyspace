# ==============================================================================
# Yazi 主题配置 — Catppuccin Macchiato（明亮配色，无依赖 flavor）
# ==============================================================================

[flavor]

[manager]
cwd = { fg = "#8bd5ca" }
hovered = { fg = "#24273a", bg = "#8bd5ca" }
find_keyword = { fg = "#eed49f", bold = true, italic = true, underline = true }
find_position = { fg = "#f5bde6", bg = "reset", bold = true, italic = true }
symlink_target = { fg = "#939ab7", italic = true }
marker_copied = { fg = "#a6da95", bg = "#a6da95" }
marker_cut = { fg = "#ed8796", bg = "#ed8796" }
marker_marked = { fg = "#8bd5ca", bg = "#8bd5ca" }
marker_selected = { fg = "#c6a0f6", bg = "#c6a0f6" }
count_copied = { fg = "#24273a", bg = "#a6da95" }
count_cut = { fg = "#24273a", bg = "#ed8796" }
count_selected = { fg = "#24273a", bg = "#c6a0f6" }
border_symbol = "│"
border_style = { fg = "#8087a2" }

[tabs]
active = { fg = "#24273a", bg = "#cad3f5", bold = true }
inactive = { fg = "#cad3f5", bg = "#494d64" }

[mode]
normal_main = { fg = "#24273a", bg = "#c6a0f6", bold = true }
normal_alt = { fg = "#c6a0f6", bg = "#363a4f" }
select_main = { fg = "#24273a", bg = "#a6da95", bold = true }
select_alt = { fg = "#a6da95", bg = "#363a4f" }
unset_main = { fg = "#24273a", bg = "#f0c6c6", bold = true }
unset_alt = { fg = "#f0c6c6", bg = "#363a4f" }

[indicator]
parent = { fg = "#24273a", bg = "#cad3f5" }
current = { fg = "#24273a", bg = "#c6a0f6" }
preview = { fg = "#24273a", bg = "#cad3f5" }
padding = { open = "", close = "" }

[status]
separator_open = ""
separator_close = ""
separator_style = { fg = "#8087a2", bg = "#8087a2" }
mode_normal = { fg = "#24273a", bg = "#a6da95", bold = true }
mode_select = { fg = "#24273a", bg = "#c6a0f6", bold = true }
mode_unset = { fg = "#24273a", bg = "#f0c6c6", bold = true }
progress_label = { fg = "#ffffff", bold = true }
progress_normal = { fg = "#a6da95", bg = "#494d64" }
progress_error = { fg = "#eed49f", bg = "#ed8796" }
permissions_type = { fg = "#8aadf4" }
permissions_read = { fg = "#eed49f" }
permissions_write = { fg = "#ed8796" }
permissions_exec = { fg = "#a6da95" }
permissions_symlink = { fg = "#8bd5ca" }

[select]
border = { fg = "#c6a0f6" }
active = { fg = "#24273a", bg = "#a6da95", bold = true }
inactive = { fg = "#cad3f5" }

[input]
border = { fg = "#c6a0f6" }
title = { fg = "#c6a0f6" }
value = { fg = "#cad3f5" }
selected = { fg = "#24273a", bg = "#c6a0f6", bold = true }

[completion]
border = { fg = "#c6a0f6" }
active = { fg = "#24273a", bg = "#c6a0f6", bold = true }
inactive = { fg = "#cad3f5" }

[tasks]
border = { fg = "#c6a0f6" }
title = { fg = "#c6a0f6" }
hovered = { fg = "#f5bde6", bold = true }

[which]
mask = { bg = "#363a4f" }
cand = { fg = "#8bd5ca" }
rest = { fg = "#939ab7" }
desc = { fg = "#f5bde6" }
separator = "  "
separator_style = { fg = "#5b6078" }

[help]
on = { fg = "#8bd5ca" }
run = { fg = "#f5bde6" }
hovered = { fg = "#24273a", bg = "#5b6078", bold = true }
footer = { fg = "#cad3f5", bg = "#494d64" }

[notify]
title_info = { fg = "#8bd5ca" }
title_warn = { fg = "#eed49f" }
title_error = { fg = "#ed8796" }