# ==============================================================================
# Starship 提示符 — Catppuccin Mocha 风格极简版
# 保留你的简洁哲学，加入适度信息（git 状态、时间）
# ==============================================================================

add_newline = false
command_timeout = 10000

# 格式：左提示 → 右提示不显示（保持简洁）
format = """
[](#89b4fa)\
$directory\
$git_branch\
$git_status\
$python\
$fill\
$time\
$character\
"""

right_format = ""

# --- 分隔线（简洁蓝色竖线） ---
[fill]
style = ""

# --- 目录 ---
[directory]
style = "bold #89b4fa"
format = "[$path]($style)"
truncate_to_repo = false
truncation_length = 3
truncation_symbol = "…/"

# --- Git 分支 ---
[git_branch]
format = " [$symbol$branch]($style)"
style = "bold #cba6f7"
symbol = ""
truncation_length = 24
truncation_symbol = "…"

# --- Git 状态（简洁版，只有变化时显示） ---
[git_status]
stashed = ""
deleted = ""
renamed = ""
modified = ""
staged = ""
untracked = ""
ahead = "⇡"
behind = "⇣"
diverged = "⇕"
conflicted = "="
style = "#f9e2af"

# --- Python 虚拟环境 ---
[python]
format = ' [\($virtualenv\)]($style)'
style = 'bold #a6e3a1'
python_binary = ['python3', 'python']
detect_extensions = []
detect_files = []
detect_folders = []
detect_env_vars = ['VIRTUAL_ENV', 'CONDA_DEFAULT_ENV', 'PIP_REQUIRE_VIRTUALENV']

# --- 时间 ---
[time]
format = '[$time]($style)'
style = '#585b70'
disabled = false
time_format = '%H:%M'

# --- 提示符字符 ---
[character]
success_symbol = "[>](bold #89b4fa)"
error_symbol = "[>](bold #f38ba8)"
format = "$symbol "
vicmd_symbol = "[<](bold #a6e3a1)"

# --- 禁用不用的模块 ---
[aws]
disabled = true

[gcloud]
disabled = true

[kubernetes]
disabled = true

[package]
disabled = true

[conda]
disabled = true

[memory_usage]
disabled = true

[battery]
disabled = true
