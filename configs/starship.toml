# ==============================================================================
# Starship 提示符 — Catppuccin Mocha 风格 × 实际功能配置
# 保留你完整的 Conda/Package/Tmux 环境模块 + time 模块
# ==============================================================================

add_newline = false
command_timeout = 10000

# 双行布局：第一行环境信息，第二行纯净输入
format = """
\n$directory\
$git_branch\
$git_status\
$python\
$conda\
$package\
\n$character\
"""

# ❯ 输入提示符
[character]
success_symbol = "[⚡](bold #89b4fa) [❯](bold #a6e3a1) "
error_symbol = "[💥](bold #f38ba8) [❯](bold #f38ba8) "

# 📂 目录模块
[directory]
format = "[📁 $path ](bold #89b4fa)"
truncate_to_repo = false
truncation_length = 3
truncation_symbol = "…/"

# 🦚 Conda 环境
[conda]
symbol = "🦚 "
format = '[($symbol$environment) ]($style)'
style = "bold #a6e3a1"
ignore_base = true

# 📦 项目版本提示
[package]
symbol = "📦 "
style = "bold #f9e2af"
format = "[($symbol$version) ]($style)"

# 🌿 Git 分支
[git_branch]
symbol = " "
style = "bold #cba6f7"
format = "[$symbol$branch]($style):"
truncation_length = 24
truncation_symbol = "…"

# 📊 Git 状态
[git_status]
style = "bold #f38ba8"
format = "[$all_status$ahead$behind]($style)"
conflicted = "="
ahead = "↑"
behind = "↓"
untracked = "?"
modified = "!"
staged = "+"

# 🐍 Python 虚拟环境
[python]
symbol = "🐍 "
format = '[ $symbol$virtualenv ]($style)'
style = "bold #a6e3a1"
python_binary = ['python3', 'python']
detect_extensions = []
detect_files = []
detect_folders = []
detect_env_vars = ['VIRTUAL_ENV', 'CONDA_DEFAULT_ENV', 'PIP_REQUIRE_VIRTUALENV']

# 🕐 时间
[time]
format = '[$time]($style)'
style = '#585b70'
disabled = false
time_format = '%H:%M'

# --- 禁用不用的模块 ---
[aws]
disabled = true

[gcloud]
disabled = true

[kubernetes]
disabled = true

[memory_usage]
disabled = true

[battery]
disabled = true
